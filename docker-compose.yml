services:
  db:
    image: postgres:15
    container_name: "${PROJECT_NAME}"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - ./.docker-db-data:/var/lib/postgresql/data/
